<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-5">

    <div class="card bg-secondary shadow p-4">

        <h1 class="text-center mb-4">Interview Result</h1>

        <div class="text-center">
            <h3>Your Score: {{ score }}/{{ total }}</h3>
            <h4>{{ percentage }}%</h4>
        </div>

        <div class="progress my-4" style="height: 25px;">
            <div
                class="progress-bar progress-bar-striped progress-bar-animated"
                role="progressbar"
                style="width: {{ percentage }}%;"
                aria-valuenow="{{ percentage }}"
                aria-valuemin="0"
                aria-valuemax="100">
                {{ percentage }}%
            </div>
        </div>

        <h3 class="mb-3">Feedback</h3>

        {% for item in feedback %}
        <div class="card bg-dark text-white mb-3">
            <div class="card-body">
                <pre class="mb-0 text-white" style="white-space: pre-wrap;">{{ item }}</pre>
            </div>
        </div>
        {% endfor %}

        <div class="text-center mt-4">
            <a href="/" class="btn btn-success btn-lg">
                Take Another Interview
            </a>
        </div>

    </div>

</div>

</body>
</html>
